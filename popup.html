<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      background: #fafafa;
      color: #333;
    }
    h1 { font-size: 18px; margin-bottom: 16px; text-align: center; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    input[type="password"], input[type="text"], select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-open { background: #10b981; color: #fff; }
    .btn-open:hover { background: #059669; }
    .status { font-size: 12px; color: #10b981; text-align: center; margin-top: 4px; display: none; }
    .divider { border-top: 1px solid #eee; margin: 16px 0; }
  </style>
</head>
<body>
  <h1>English Reader</h1>

  <label for="apiKey">OpenAI API Key</label>
  <input type="password" id="apiKey" placeholder="sk-...">

  <label for="model">Model</label>
  <select id="model">
    <option value="gpt-4o-mini">GPT-4o Mini (fast & cheap)</option>
    <option value="gpt-4o">GPT-4o</option>
    <option value="gpt-4-turbo">GPT-4 Turbo</option>
  </select>

  <button class="btn btn-primary" id="saveBtn">Save Settings</button>
  <div class="status" id="status">Settings saved!</div>

  <div class="divider"></div>

  <button class="btn btn-open" id="openBtn">Open Reader</button>

  <script src="popup.js"></script>
</body>
</html>
